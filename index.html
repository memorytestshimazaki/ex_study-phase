<!DOCTYPE html>
<html lang="ja">

<head>

  <meta charset="UTF-8">

  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>単語記憶実験</title>

  <!-- jsPsych -->
  <script src="https://unpkg.com/jspsych@7.3.4"></script>

  <script src="https://unpkg.com/@jspsych/plugin-html-keyboard-response@1.1.3"></script>
  <!-- プラグイン -->
  <script src="https://unpkg.com/@jspsych/plugin-html-button-response@1.1.3"></script>

  <script src="https://unpkg.com/@jspsych/plugin-html-keyboard-response@1.1.3"></script>

    <script src="https://unpkg.com/@jspsych/plugin-survey-text@1.1.3"></script>

  <style>

    html, body {
      width: 100%;
      height: 100%;
      margin: 0;
      padding: 0;
      background-color: white;
    }

    /* jsPsych画面全体を中央配置 */
    .jspsych-display-element {
      display: flex !important;
      justify-content: center !important;
      align-items: center !important;
      width: 100vw;
      height: 100vh;
    }

    .center-text {
      width: 100%;
      text-align: center;
      font-family: sans-serif;
    }

  </style>

</head>

<body></body>

<script>

const jsPsych = initJsPsych();
const DAY = 99;

let timeline = [];
const GAS_URL =
"https://script.google.com/macros/s/AKfycbyjS7vdxjAuxQ6OQheR_hI0nQM-G8ihi0kgLI8EqMKlAYyzAkxfFFQROFv0Hv8t9ORt/exec";

let participant_id = "anonymous";
let study_start = "";



/* ------------------------
   教示画面
------------------------ */

timeline.push({

  type: jsPsychHtmlButtonResponse,

  stimulus: `
   <div class="center-text"
         style="font-size:18px; line-height:1.8;">
      これから単語が1語ずつ表示されます。<br>
      後ほどテストを行うので、<br>
      単語をできるだけ多く覚えてください。<br>
      <b>スクリーンショットやメモは取らず、<br>
        単語を見て覚えてください。</b><br><br>
      準備ができたら開始してください。<br><br>
    </div>
  `,

  choices: ['開始する']

});

/* ------------------------
   単語リスト
------------------------ */

let study_words = [
  {id: 991, word: "桜花"},
  {id: 992, word: "月光"},
  {id: 993, word: "海風"},
  {id: 994, word: "図書"},
  {id: 995, word: "星空"},
  {id: 996, word: "砂浜"},
  {id: 997, word: "蝶々"},
  {id: 998, word: "虹彩"},
  {id: 999, word: "橋梁"},
  {id: 9910, word: "河川"},
  {id: 9911, word: "森林"},
  {id: 9912, word: "鳥類"},
  {id: 9913, word: "窓辺"},
  {id: 9914, word: "鍵穴"},
  {id: 9915, word: "石畳"}

];

/* ------------------------
   ランダム化
------------------------ */

study_words = jsPsych.randomization.shuffle(study_words);
const word_order = study_words.map((item, index) => ({
  serial_position: index + 1,
  word_id: item.id,
  word: item.word
}));
/* ------------------------
   単語提示フェーズ
------------------------ */

study_words.forEach(function(item, index){
  /* 注視点 ＋ */

  timeline.push({

    type: jsPsychHtmlKeyboardResponse,

    stimulus: `
      <div class="center-text"
           style="font-size:80px;">
        ＋
      </div>
    `,

    choices: "NO_KEYS",

    trial_duration: 1000

  });

  /* 単語提示 */

  timeline.push({

    type: jsPsychHtmlKeyboardResponse,

    stimulus: `
      <div class="center-text"
           style="font-size:100px;">
        ${item.word}
      </div>
    `,

    choices: "NO_KEYS",

    trial_duration: 5000,
     data: {
      word_id: item.id,
      word: item.word,
      serial_position: index + 1
    }

  });
});

study_start = new Date().toISOString();

fetch(GAS_URL, {
  method: "POST",
  headers: {
    "Content-Type": "text/plain;charset=utf-8"
  },
  body: JSON.stringify({
    type: "study_start",
    participant_id: participant_id,
    day: DAY,
    word_order: word_order
  })
});


/* ------------------------
   終了画面
------------------------ */

timeline.push({

  type: jsPsychHtmlKeyboardResponse,

  stimulus: `
    <div class="center-text"
         style="font-size:18px; line-height:1.8;">
      ご協力ありがとうございました。<br><br>
      <b>ブラウザの「戻る」操作を行い、<br>
        前のアンケート画面に戻ってください。</b><br>
      （戻るボタンやスワイプ操作など、<br>
      お使いの端末の方法をご利用ください。）<br>  
      ※ページを閉じたり、×ボタンを押したり<br>
      しないでください。<br><br>
      アンケート画面に戻りましたら、<br>
      「次へ」を押して回答を続けてください。<br>
    </div>
  `,

  choices: "NO_KEYS"

});

/* ------------------------
   実行
------------------------ */

jsPsych.run(timeline);

</script>

</html>
